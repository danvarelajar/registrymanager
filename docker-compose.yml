services:
  app:
    build: .
    ports:
      - "3000:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./images:/app/images
      - ./data:/app/data
    environment:
      - WATCH_FOLDER=/app/images
      - PORT=3001
      # Set to 1 to allow self-signed TLS certs on registries (e.g. "fetch failed")
      - REGISTRY_INSECURE_TLS=1
    restart: unless-stopped
